services:
  mlflow_server:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    restart: always
    expose:
      - "5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
      - MLFLOW_SERVER_CORS_ALLOWED_ORIGINS=*
    volumes:
      - ./mlflow_data:/app/mlflow_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2500M 
    command: >
      mlflow server 
      --backend-store-uri sqlite:///app/mlflow_data/mlflow.db 
      --default-artifact-root s3://${S3_BUCKET_NAME}/mlflow-artifacts
      --host 0.0.0.0

  nginx:
    image: nginx:alpine  # 'alpine' is much smaller/lighter for Free Tier
    container_name: mlflow_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 200M
    depends_on:
      mlflow_server:
        condition: service_healthy