events {}

http {
    # Resolve service names via Docker embedded DNS at runtime.
    resolver 127.0.0.11 ipv6=off valid=30s;

    client_max_body_size 20M; # Allows uploading larger plots/files if needed

    server {
        listen 80;

        location / {
            set $mlflow_upstream http://mlflow_server:5000;
            proxy_pass $mlflow_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}